<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <title>Aura Heart Mascot - Layered Animation Production Asset</title>
  <desc>Layered SVG mascot with separated animation-ready vector objects for Rive, Lottie, Figma, and SVG workflows.</desc>
  <defs>
    <radialGradient id="bodyGradient" cx="40%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#C7A7FF"/>
      <stop offset="52%" stop-color="#9668F0"/>
      <stop offset="100%" stop-color="#734FDB"/>
    </radialGradient>
    <radialGradient id="bodyHighlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="limbGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B58BFF"/>
      <stop offset="100%" stop-color="#7350D9"/>
    </linearGradient>
    <radialGradient id="shoeGradient" cx="42%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#B995FF"/>
      <stop offset="100%" stop-color="#6D49D0"/>
    </radialGradient>
    <radialGradient id="eyeGradient" cx="36%" cy="26%" r="62%">
      <stop offset="0%" stop-color="#4B4655"/>
      <stop offset="62%" stop-color="#16131F"/>
      <stop offset="100%" stop-color="#05030A"/>
    </radialGradient>
    <linearGradient id="mouthGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07040F"/>
      <stop offset="100%" stop-color="#25112B"/>
    </linearGradient>
    <linearGradient id="tongueGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7B85"/>
      <stop offset="100%" stop-color="#D93D54"/>
    </linearGradient>
    <filter id="softContact" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="8" result="offset"/>
      <feComponentTransfer in="offset" result="shadow">
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="mascot" data-layer="root" data-export-note="All child groups are isolated animation layers with separate vector shapes.">

    <g id="legs" data-layer="limbs-lower" data-origin="512 690">
      <g id="left_thigh" data-part="left_thigh" data-origin="422 670">
        <rect x="383" y="595" width="76" height="172" rx="36" fill="url(#limbGradient)"/>
      </g>
      <g id="right_thigh" data-part="right_thigh" data-origin="604 670">
        <rect x="565" y="595" width="76" height="172" rx="36" fill="url(#limbGradient)"/>
      </g>
      <g id="left_lower_leg" data-part="left_lower_leg" data-origin="421 772">
        <rect x="376" y="735" width="88" height="56" rx="28" fill="url(#limbGradient)"/>
      </g>
      <g id="right_lower_leg" data-part="right_lower_leg" data-origin="603 772">
        <rect x="560" y="735" width="88" height="56" rx="28" fill="url(#limbGradient)"/>
      </g>
      <g id="left_shoe" data-part="left_shoe" data-origin="400 824" filter="url(#softContact)">
        <path d="M338 822C338 781 373 759 421 761C465 763 492 787 492 825C492 854 466 870 410 870H365C348 870 338 851 338 822Z" fill="url(#shoeGradient)"/>
        <ellipse cx="398" cy="792" rx="38" ry="22" fill="#FFFFFF" opacity="0.13"/>
      </g>
      <g id="right_shoe" data-part="right_shoe" data-origin="624 824" filter="url(#softContact)">
        <path d="M532 825C532 787 559 763 603 761C651 759 686 781 686 822C686 851 676 870 659 870H614C558 870 532 854 532 825Z" fill="url(#shoeGradient)"/>
        <ellipse cx="622" cy="792" rx="38" ry="22" fill="#FFFFFF" opacity="0.13"/>
      </g>
    </g>

    <g id="arms" data-layer="limbs-upper">
      <g id="left_upper_arm" data-part="left_upper_arm" data-origin="305 472">
        <path d="M328 469C305 487 283 522 274 566" stroke="url(#limbGradient)" stroke-width="48" stroke-linecap="round"/>
      </g>
      <g id="left_forearm" data-part="left_forearm" data-origin="258 598">
        <path d="M275 565C266 594 248 613 221 624" stroke="url(#limbGradient)" stroke-width="42" stroke-linecap="round"/>
      </g>
      <g id="left_hand" data-part="left_hand" data-origin="214 640" filter="url(#softContact)">
        <ellipse cx="219" cy="641" rx="38" ry="38" fill="url(#limbGradient)"/>
        <path d="M196 625C180 612 168 605 160 614C151 624 163 639 182 652" stroke="url(#limbGradient)" stroke-width="22" stroke-linecap="round"/>
        <path d="M212 650C201 671 200 687 214 691C228 696 237 677 239 657" stroke="url(#limbGradient)" stroke-width="21" stroke-linecap="round"/>
        <path d="M235 648C236 671 244 687 258 684C272 680 269 660 254 643" stroke="url(#limbGradient)" stroke-width="21" stroke-linecap="round"/>
      </g>
      <g id="right_upper_arm" data-part="right_upper_arm" data-origin="719 472">
        <path d="M696 469C719 487 741 522 750 566" stroke="url(#limbGradient)" stroke-width="48" stroke-linecap="round"/>
      </g>
      <g id="right_forearm" data-part="right_forearm" data-origin="766 598">
        <path d="M749 565C758 594 776 613 803 624" stroke="url(#limbGradient)" stroke-width="42" stroke-linecap="round"/>
      </g>
      <g id="right_hand" data-part="right_hand" data-origin="810 640" filter="url(#softContact)">
        <ellipse cx="805" cy="641" rx="38" ry="38" fill="url(#limbGradient)"/>
        <path d="M828 625C844 612 856 605 864 614C873 624 861 639 842 652" stroke="url(#limbGradient)" stroke-width="22" stroke-linecap="round"/>
        <path d="M812 650C823 671 824 687 810 691C796 696 787 677 785 657" stroke="url(#limbGradient)" stroke-width="21" stroke-linecap="round"/>
        <path d="M789 648C788 671 780 687 766 684C752 680 755 660 770 643" stroke="url(#limbGradient)" stroke-width="21" stroke-linecap="round"/>
      </g>
    </g>

    <g id="body" data-part="body" data-origin="512 447" filter="url(#softContact)">
      <path d="M512 693C500 687 272 564 250 367C235 234 346 151 449 224C476 243 496 270 512 299C528 270 548 243 575 224C678 151 789 234 774 367C752 564 524 687 512 693Z" fill="url(#bodyGradient)"/>
      <ellipse cx="424" cy="315" rx="114" ry="93" fill="url(#bodyHighlight)" opacity="0.38"/>
      <ellipse cx="650" cy="314" rx="87" ry="72" fill="url(#bodyHighlight)" opacity="0.28"/>
      <path d="M512 693C500 687 272 564 250 367C235 234 346 151 449 224C476 243 496 270 512 299C528 270 548 243 575 224C678 151 789 234 774 367C752 564 524 687 512 693Z" stroke="#6C49CB" stroke-opacity="0.18" stroke-width="4"/>
    </g>

    <g id="face" data-layer="facial-controls" data-origin="512 410">
      <g id="eyebrows" data-layer="eyebrows">
        <g id="left_eyebrow" data-part="left_eyebrow" data-origin="445 355">
          <path d="M414 360C429 342 459 339 478 354" stroke="#4E329D" stroke-width="9" stroke-linecap="round"/>
        </g>
        <g id="right_eyebrow" data-part="right_eyebrow" data-origin="579 355">
          <path d="M546 354C565 339 595 342 610 360" stroke="#4E329D" stroke-width="9" stroke-linecap="round"/>
        </g>
      </g>

      <g id="eyes" data-layer="eyes">
        <g id="left_eye" data-part="left_eye" data-origin="452 409">
          <ellipse cx="452" cy="409" rx="29" ry="38" fill="url(#eyeGradient)"/>
          <ellipse cx="463" cy="391" rx="8" ry="10" fill="#FFFFFF" opacity="0.92"/>
        </g>
        <g id="right_eye" data-part="right_eye" data-origin="572 409">
          <ellipse cx="572" cy="409" rx="29" ry="38" fill="url(#eyeGradient)"/>
          <ellipse cx="583" cy="391" rx="8" ry="10" fill="#FFFFFF" opacity="0.92"/>
        </g>
      </g>

      <g id="pupils" data-layer="pupils">
        <g id="left_pupil" data-part="left_pupil" data-origin="452 415">
          <ellipse cx="452" cy="415" rx="14" ry="21" fill="#05030A" opacity="0.55"/>
        </g>
        <g id="right_pupil" data-part="right_pupil" data-origin="572 415">
          <ellipse cx="572" cy="415" rx="14" ry="21" fill="#05030A" opacity="0.55"/>
        </g>
      </g>

      <g id="eyelids" data-layer="eyelids" opacity="0">
        <g id="left_eyelid" data-part="left_eyelid" data-origin="452 405">
          <path d="M423 403C431 379 474 379 481 403C473 419 432 419 423 403Z" fill="#A77CF6"/>
        </g>
        <g id="right_eyelid" data-part="right_eyelid" data-origin="572 405">
          <path d="M543 403C551 379 594 379 601 403C593 419 552 419 543 403Z" fill="#A77CF6"/>
        </g>
      </g>

      <g id="mouth_shapes" data-layer="mouth">
        <g id="mouth_outer" data-part="mouth_outer" data-origin="512 476">
          <path d="M466 459C480 492 498 508 512 508C526 508 544 492 558 459C565 443 553 430 538 436C527 440 520 448 512 448C504 448 497 440 486 436C471 430 459 443 466 459Z" fill="url(#mouthGradient)"/>
        </g>
        <g id="mouth_inner" data-part="mouth_inner" data-origin="512 490">
          <path d="M482 483C494 504 530 504 542 483C528 493 496 493 482 483Z" fill="#1A0B20" opacity="0.75"/>
        </g>
        <g id="tongue" data-part="tongue" data-origin="512 493">
          <path d="M487 489C498 477 526 477 537 489C531 507 493 507 487 489Z" fill="url(#tongueGradient)"/>
        </g>
      </g>
    </g>
  </g>
</svg>
