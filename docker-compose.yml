services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: wc_laravel_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${APP_PORT:-8080}
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-wellness_connect}
      DB_USERNAME: ${DB_USERNAME:-wellness_user}
      DB_PASSWORD: ${DB_PASSWORD:-wellness_pass}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: wc_laravel_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mariadb:11.4
    container_name: wc_mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-wellness_connect}
      MARIADB_USER: ${DB_USERNAME:-wellness_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-wellness_pass}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: wc_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      UPLOAD_LIMIT: 128M
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
